<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #16161c; -webkit-font-smoothing: antialiased; word-break: keep-all; font-family: 'Noto Sans KR', sans-serif; }
</style>
</head>
<body>
<div style="max-width:1100px; margin:40px auto; padding:0 24px;">
  <div style="background:#090806; border:1px solid rgba(230,169,77,.12); border-radius:16px; padding:34px 40px 38px; color:#ece2d0; box-shadow:0 30px 60px -30px rgba(0,0,0,.8);">
    <!-- city tabs -->
    <div style="display:flex; gap:26px; align-items:baseline; border-bottom:1px solid rgba(230,169,77,.12);">
      <span style="font-size:17px; font-weight:700; border-bottom:2px solid #e6a94d; padding-bottom:12px;">전체</span>
      <span style="font-size:15px; color:#9a8d73; padding-bottom:12px;">도쿄</span>
      <span style="font-size:15px; color:#9a8d73; padding-bottom:12px;">교토</span>
      <span style="font-size:15px; color:#9a8d73; padding-bottom:12px;">오사카</span>
      <span style="font-size:15px; color:#9a8d73; padding-bottom:12px;">후쿠오카</span>
      <span style="font-size:15px; color:#9a8d73; padding-bottom:12px;">삿포로</span>
      <span style="margin-left:auto; font-size:12.5px; color:#9a8d73; padding-bottom:12px;">350곳 표시 중</span>
    </div>
    <!-- ribbon with tier cards -->
    <div style="margin-top:22px; position:relative; border-radius:14px; overflow:hidden; background:linear-gradient(135deg, #2a2012, #14100a 60%); border:1px solid rgba(230,169,77,.3);">
      <div style="position:absolute; inset:0; background:radial-gradient(700px 220px at 8% 0%, rgba(230,169,77,.18), transparent);"></div>
      <div style="position:relative; display:flex; align-items:stretch; gap:24px; padding:22px 26px;">
        <div style="flex:none; align-self:center; width:200px;">
          <div style="font-size:10.5px; letter-spacing:.3em; color:#e6a94d; font-weight:700;">SUNTORY</div>
          <div style="font-family:'Zen Kaku Gothic New',sans-serif; font-weight:900; font-size:26px; color:#f3c877; margin-top:3px;">神泡達人店</div>
          <div style="font-size:11.5px; color:#9a8d73; margin-top:5px; line-height:1.55;">완벽한 거품,<br>산토리가 인증한 맥주 맛집</div>
        </div>
        <div style="width:1px; background:rgba(230,169,77,.2);"></div>
        <div style="flex:1; display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px;">
          <span style="border-radius:12px; background:linear-gradient(#f3c877,#e6a94d); color:#1a1206; padding:14px 16px; box-shadow:0 8px 24px -12px rgba(230,169,77,.5);">
            <span style="display:block; font-size:15px; font-weight:800;">전체</span>
            <span style="display:block; font-size:11.5px; margin-top:3px; font-weight:600; opacity:.75;">모든 등급 포함</span>
            <span style="display:block; font-family:'Zen Kaku Gothic New',sans-serif; font-weight:900; font-size:20px; margin-top:8px;">350<span style="font-size:11px; font-weight:600;">곳</span></span>
          </span>
          <span style="border-radius:12px; border:1px solid rgba(230,169,77,.35); background:rgba(9,8,6,.5); color:#ece2d0; padding:14px 16px;">
            <span style="display:flex; align-items:center; gap:6px; font-size:15px; font-weight:800;">초달인점 <span style="font-size:9.5px; letter-spacing:.08em; background:linear-gradient(#f3c877,#e6a94d); color:#1a1206; font-weight:800; padding:2px 6px; border-radius:99px;">超達人</span></span>
            <span style="display:block; font-size:11.5px; margin-top:3px; color:#9a8d73;">신포 품질 최상위 인증</span>
            <span style="display:block; font-family:'Zen Kaku Gothic New',sans-serif; font-weight:900; font-size:20px; margin-top:8px; color:#c6b99e;">217<span style="font-size:11px; font-weight:500; color:#9a8d73;">곳</span></span>
          </span>
          <span style="border-radius:12px; border:1px solid rgba(230,169,77,.35); background:rgba(9,8,6,.5); color:#ece2d0; padding:14px 16px;">
            <span style="display:flex; align-items:center; gap:6px; font-size:15px; font-weight:800;">달인점 <span style="font-size:9.5px; letter-spacing:.08em; border:1px solid rgba(230,169,77,.45); color:#e6a94d; font-weight:800; padding:2px 6px; border-radius:99px;">達人</span></span>
            <span style="display:block; font-size:11.5px; margin-top:3px; color:#9a8d73;">신포 품질 인증점</span>
            <span style="display:block; font-family:'Zen Kaku Gothic New',sans-serif; font-weight:900; font-size:20px; margin-top:8px; color:#c6b99e;">133<span style="font-size:11px; font-weight:500; color:#9a8d73;">곳</span></span>
          </span>
          <span style="border-radius:12px; border:1px solid rgba(243,200,119,.4); background:rgba(9,8,6,.5); color:#f3c877; padding:14px 16px;">
            <span style="display:block; font-size:15px; font-weight:800;">마스터즈드림</span>
            <span style="display:block; font-size:11.5px; margin-top:3px; color:#9a8d73;">프리미엄 원액 취급점</span>
            <span style="display:block; font-family:'Zen Kaku Gothic New',sans-serif; font-weight:900; font-size:20px; margin-top:8px; color:#c6b99e;">48<span style="font-size:11px; font-weight:500; color:#9a8d73;">곳</span></span>
          </span>
        </div>
      </div>
    </div>
    <!-- one-line rest -->
    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; align-items:center;">
      <span style="padding:8px 16px; border-radius:99px; background:linear-gradient(#f3c877,#e6a94d); color:#1a1206; font-size:13px; font-weight:700;">전체</span>
      <span style="padding:8px 16px; border-radius:99px; border:1px solid rgba(230,169,77,.25); color:#c6b99e; font-size:13px;">스시·해산물</span>
      <span style="padding:8px 16px; border-radius:99px; border:1px solid rgba(230,169,77,.25); color:#c6b99e; font-size:13px;">고기구이</span>
      <span style="padding:8px 16px; border-radius:99px; border:1px solid rgba(230,169,77,.25); color:#c6b99e; font-size:13px;">면류</span>
      <span style="padding:8px 16px; border-radius:99px; border:1px solid rgba(230,169,77,.25); color:#c6b99e; font-size:13px;">이자카야·바</span>
      <span style="padding:8px 16px; border-radius:99px; border:1px solid rgba(230,169,77,.25); color:#c6b99e; font-size:13px;">그 외 +4</span>
      <span style="width:1px; height:22px; background:rgba(230,169,77,.15); margin:0 4px;"></span>
      <span style="display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border-radius:9px; border:1px solid rgba(230,169,77,.25); color:#c6b99e; font-size:13px;">점수·리뷰 <svg width="9" height="6" viewBox="0 0 10 6" fill="none" stroke="#9a8d73" stroke-width="1.6"><path d="M1 1l4 4 4-4"/></svg></span>
      <span style="padding:8px 14px; border-radius:9px; border:1px solid rgba(230,169,77,.25); color:#c6b99e; font-size:13px;">★ 미슐랭</span>
      <span style="padding:8px 14px; border-radius:9px; border:1px solid rgba(230,169,77,.25); color:#c6b99e; font-size:13px;">KR 한국인 픽</span>
      <span style="margin-left:auto; display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border-radius:9px; border:1px solid rgba(230,169,77,.25); color:#c6b99e; font-size:13px;">기본순 <svg width="9" height="6" viewBox="0 0 10 6" fill="none" stroke="#9a8d73" stroke-width="1.6"><path d="M1 1l4 4 4-4"/></svg></span>
    </div>
    <!-- legend -->
    <div style="display:flex; flex-wrap:wrap; align-items:center; gap:10px 22px; margin-top:20px; padding-top:16px; border-top:1px solid rgba(230,169,77,.1); font-size:12px; color:#9a8d73;">
      <span style="display:inline-flex; align-items:center; gap:7px;"><span style="width:8px; height:8px; border-radius:50%; background:#e6a94d;"></span>산토리 인증 등급</span>
      <span style="display:inline-flex; align-items:center; gap:7px;"><span style="width:8px; height:8px; border-radius:50%; background:#6faf6b;"></span>타베로그 3.0+ (전체 수록 기준)</span>
      <span style="display:inline-flex; align-items:center; gap:7px;">
        <span style="display:inline-flex; align-items:center; justify-content:center; width:17px; height:17px; border-radius:50%; background:#c8102e; color:#fff; font-size:9.5px; line-height:1;">★</span> 미슐랭 스타 ·
        <span style="display:inline-flex; align-items:center; justify-content:center; width:17px; height:17px; border-radius:50%; background:#a8763a; color:#fff; font-size:9.5px; font-weight:700; line-height:1;">B</span> 빕구르망
      </span>
      <span style="display:inline-flex; align-items:center; gap:7px;"><span style="display:inline-flex; align-items:center; justify-content:center; width:17px; height:17px; border-radius:50%; background:linear-gradient(#f3c877,#e6a94d); color:#1a1206; font-size:10px; font-weight:800; line-height:1;">M</span> 마스터즈드림(マスターズドリーム)</span>
      <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 11px; border-radius:99px; border:1px solid rgba(224,57,60,.4); background:rgba(224,57,60,.08);"><span style="width:7px; height:7px; border-radius:50%; background:#e0393c;"></span><span style="color:#e0393c; font-weight:700; font-size:11px;">KR</span> <span style="color:#e0a0a1;">한국인 픽</span></span>
    </div>
  </div>
</div>
</body>
</html>
